{{- if .Values.backend.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "taskflow.fullname" . }}-backend-secret
  labels:
    {{- include "taskflow.backend.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET: {{ .Values.backend.secrets.JWT_SECRET | b64enc | quote }}
  DB_PASSWORD: {{ .Values.postgresql.auth.password | b64enc | quote }}
{{- end }}
